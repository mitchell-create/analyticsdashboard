# Prefect 3 — deployment definitions (run: prefect deploy)
# See https://docs.prefect.io/latest/how-to-guides/deployments/prefect-yaml

name: measurement-platform
prefect-version: ">=3.0.0"

deployments:
  - name: daily
    entrypoint: orchestration/prefect/flows/daily_pipeline.py:daily_pipeline
    description: Daily dbt run + dbt test after Airbyte
    schedule:
      cron: "0 6 * * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    # Pass env vars to flow runs (dbt needs Path to find dbt CLI)
    job_variables:
      env:
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        DBT_PROJECT_DIR: "{{ $DBT_PROJECT_DIR }}"
        Path: "{{ $Path }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"
        SLACK_ALERT_CHANNEL_ID: "{{ $SLACK_ALERT_CHANNEL_ID }}"

  # Chellegum report — 1st of every month (previous month data)
  # Posts to #chubblegum channel (C0AEXRYPA9Y)
  - name: chellegum-report-monthly
    entrypoint: orchestration/prefect/flows/scheduled_reports.py:chellegum_scheduled_report
    description: "Chellegum performance report: full previous month (posts on the 1st)"
    schedule:
      cron: "0 9 1 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"

  # Chellegum report — 14th of every month (last 14 days)
  # Posts to #chubblegum channel (C0AEXRYPA9Y)
  - name: chellegum-report-14th
    entrypoint: orchestration/prefect/flows/scheduled_reports.py:chellegum_scheduled_report
    description: "Chellegum performance report: last 14 days (posts on the 14th)"
    schedule:
      cron: "0 9 14 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"
