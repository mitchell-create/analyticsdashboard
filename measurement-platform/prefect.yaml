# Prefect 3 — deployment definitions (run: prefect deploy)
# See https://docs.prefect.io/latest/how-to-guides/deployments/prefect-yaml

name: measurement-platform
prefect-version: ">=3.0.0"

deployments:
  - name: daily
    entrypoint: orchestration/prefect/flows/daily_pipeline.py:daily_pipeline
    description: Daily dbt run + dbt test after Airbyte
    schedule:
      cron: "0 6 * * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    # Pass env vars to flow runs (dbt needs Path to find dbt CLI)
    job_variables:
      env:
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        DBT_PROJECT_DIR: "{{ $DBT_PROJECT_DIR }}"
        Path: "{{ $Path }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"
        SLACK_ALERT_CHANNEL_ID: "{{ $SLACK_ALERT_CHANNEL_ID }}"

  # Chellegum report — 1st of every month (previous month data)
  # Posts to #chubblegum channel (C0AEXRYPA9Y)
  - name: chellegum-report-monthly
    entrypoint: orchestration/prefect/flows/scheduled_reports.py:chellegum_scheduled_report
    description: "Chellegum performance report: full previous month (posts on the 1st)"
    schedule:
      cron: "0 9 1 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"

  # Chellegum report — 14th of every month (last 14 days)
  # Posts to #chubblegum channel (C0AEXRYPA9Y)
  - name: chellegum-report-14th
    entrypoint: orchestration/prefect/flows/scheduled_reports.py:chellegum_scheduled_report
    description: "Chellegum performance report: last 14 days (posts on the 14th)"
    schedule:
      cron: "0 9 14 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        SUPABASE_URL: "{{ $SUPABASE_URL }}"
        SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"

  # Data sync — direct-API pull (Meta/Klaviyo/GA4) + dbt build.
  # Runs the day before the 14th report, at 2am ET, so fresh data lands first.
  # The flow self-loads measurement-platform/.env for all credentials.
  - name: data-sync-13th
    entrypoint: orchestration/prefect/flows/data_sync.py:data_sync
    description: "Direct-API sync (Meta/Klaviyo/GA4) + dbt — feeds the 14th report"
    schedule:
      cron: "0 2 13 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        META_ACCESS_TOKEN: "{{ $META_ACCESS_TOKEN }}"
        KLAVIYO_CLIENTS_JSON: "{{ $KLAVIYO_CLIENTS_JSON }}"
        DBT_PROJECT_DIR: "{{ $DBT_PROJECT_DIR }}"
        Path: "{{ $Path }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"
        SLACK_ALERT_CHANNEL_ID: "{{ $SLACK_ALERT_CHANNEL_ID }}"

  # Data sync — runs early on the 1st (2am ET) so the full previous month is
  # captured before the 9am "previous full month" report.
  # Uses the 1st (which always exists) instead of the 31st, which silently
  # skipped 30-day months in the old Airbyte schedule.
  - name: data-sync-1st
    entrypoint: orchestration/prefect/flows/data_sync.py:data_sync
    description: "Direct-API sync (Meta/Klaviyo/GA4) + dbt — feeds the 1st report"
    schedule:
      cron: "0 2 1 * *"
      timezone: "America/New_York"
    work_pool:
      name: default-agent-pool
    parameters: {}
    job_variables:
      env:
        SUPABASE_DB_URL: "{{ $SUPABASE_DB_URL }}"
        META_ACCESS_TOKEN: "{{ $META_ACCESS_TOKEN }}"
        KLAVIYO_CLIENTS_JSON: "{{ $KLAVIYO_CLIENTS_JSON }}"
        DBT_PROJECT_DIR: "{{ $DBT_PROJECT_DIR }}"
        Path: "{{ $Path }}"
        SLACK_BOT_TOKEN: "{{ $SLACK_BOT_TOKEN }}"
        SLACK_ALERT_CHANNEL_ID: "{{ $SLACK_ALERT_CHANNEL_ID }}"
