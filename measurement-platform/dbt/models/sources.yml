# sources.yml — Raw Airbyte / Metricool tables (adjust table names to match your syncs)
# Map Airbyte stream names to source tables. Schema = raw_schema (default: raw).

version: 2

sources:
  - name: raw_airbyte
    description: Raw data from Airbyte (Meta, Google, TikTok Ads, Shopify, Klaviyo)
    schema: "{{ var('raw_schema', 'raw') }}"
    tables:
      # Meta: Airbyte stream ads_insights
      - name: ads_insights
        identifier: meta_ads_insights
        description: Meta Ads daily insights (Airbyte ads_insights)
      - name: ads_insights_region
        identifier: meta_ads_insights_region
        description: Meta Ads insights by region (US state) for GeoLift
      # Google: stream account_performance_report
      - name: account_performance_report
        identifier: google_account_performance_report
        description: Google Ads account performance (Airbyte)
      - name: tiktok_advertisers_reports_daily
        description: TikTok Ads daily reports (Airbyte, stream prefix tiktok_)
      - name: orders
        description: Shopify orders (Airbyte) — schema raw, table orders
      - name: chubble_orders
        description: Chubble Shopify orders (Airbyte)
      - name: expand_orders
        description: Expand Shopify orders (Airbyte)
      - name: orders_babybay
        description: Babybay WooCommerce orders (Airbyte)
      - name: orders_crazyrumors
        description: Crazyrumors Shopify orders (Airbyte)
      - name: orders_zoka
        description: Zoka Shopify orders (Airbyte)
      - name: orders_motive
        description: Motive Shopify orders (Airbyte)
      # Klaviyo: Airbyte stream campaigns
      - name: klaviyo_campaigns
        description: Klaviyo campaigns (Airbyte)

  # ------------------------------------------------------------------
  # Per-client: Klaviyo (prefix = {client_slug}_klaviyo_)
  # Note: Current Klaviyo tables have hashed names from old setup.
  # These will be fixed when Klaviyo connections are re-created with
  # correct prefix pattern ({client_slug}_klaviyo_).
  # ------------------------------------------------------------------
  - name: raw_klaviyo
    description: "Per-client Klaviyo data"
    schema: raw
    tables:
      - name: campaigns
        identifier: "{{ var('client_slug') }}_klaviyo_campaigns"
        description: Klaviyo campaigns
      - name: events
        identifier: "{{ var('client_slug') }}_klaviyo_events"
        description: Klaviyo events (sends, opens, clicks)
      - name: campaign_values_reports
        identifier: "{{ var('client_slug') }}_klaviyo_campaign_values_reports"
        description: Klaviyo aggregated campaign metrics

  # ------------------------------------------------------------------
  # Marts config tables (manually managed, not dbt-materialized)
  # ------------------------------------------------------------------
  - name: marts_config
    description: Configuration tables in public_marts (currency, client config)
    schema: public_marts
    tables:
      - name: currency_config
        description: Per-client currency conversion rates (ad platform → Shopify currency)

   # ------------------------------------------------------------------
  # Coupler.io (TikTok GMV Max, etc.)
  # ------------------------------------------------------------------
  - name: raw_coupler
    description: Raw data from Coupler.io (TikTok GMV Max)
    schema: coupler_internal
    tables:
      - name: tiktok_gmv_max
        description: TikTok GMV Max daily report (Coupler.io TikTok connector)

  # ------------------------------------------------------------------
  # GA4 (Google Analytics 4) — all properties in shared tables
  # ------------------------------------------------------------------
  - name: raw_ga4
    description: GA4 data from Airbyte (all properties mixed, use property_id to filter)
    schema: raw
    tables:
      - name: ga4_events_report
        description: GA4 events with counts, users, revenue by event name
      - name: ga4_website_overview
        description: GA4 sessions, users, pageviews, engagement metrics
      - name: ga4_conversions_report
        description: GA4 conversion events with user counts and revenue
      - name: ga4_traffic_acquisition_session_source_medium_report
        description: GA4 sessions by source/medium
      - name: ga4_traffic_acquisition_session_default_channel_grouping_report
        description: GA4 sessions by channel group
      - name: ga4_locations
        description: GA4 sessions by geography
      - name: ga4_devices
        description: GA4 sessions by device category
      - name: ga4_pages
        description: GA4 pageviews by page path
      - name: ga4_daily_active_users
        description: GA4 daily active users
      - name: ga4_traffic_sources
        description: GA4 traffic sources
      - name: ga4_demographic_country_report
        description: GA4 demographics by country
      - name: ga4_user_acquisition_first_user_source_medium_report
        description: GA4 new user acquisition by source/medium

  # ------------------------------------------------------------------
  # Optional: Metricool (TikTok organic — disabled by default)
  # ------------------------------------------------------------------
  - name: raw_metricool
    description: Raw TikTok organic metrics from Metricool
    schema: "{{ var('raw_schema', 'raw') }}"
    tables:
      - name: metricool_tiktok_daily
        description: Metricool TikTok account daily metrics
