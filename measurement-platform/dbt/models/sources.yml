# sources.yml — Raw Airbyte tables
#
# Table names match what Airbyte Direct Load actually creates.
# Some tables have hash suffixes from the Airbyte Postgres v3 connector.
#
# Run dbt per client: dbt run --vars '{client_slug: expand}'

version: 2

sources:
  # ------------------------------------------------------------------
  # Shared: Meta Ads (all clients in one table, hash suffix from Airbyte)
  # ------------------------------------------------------------------
  - name: raw_shared
    description: Shared raw data from ad platforms (all clients mixed)
    schema: raw
    tables:
      - name: ads_insights
        identifier: rawmeta_adsinsights3f0d9c7e820e3b301ace07c1d804dcce
        description: Meta Ads daily insights
      - name: ads_insights_region
        identifier: rawmeta_adss_regionc500077594d248030ddb964985f0ef12
        description: Meta Ads insights by US region
      - name: google_campaign
        description: Google Ads campaign data
      - name: google_geographic_view
        description: Google Ads geographic view
      - name: tiktok_advertisers_reports_daily
        description: TikTok Ads daily reports

  # ------------------------------------------------------------------
  # Per-client: Shopify (prefix = {client_slug}_)
  # ------------------------------------------------------------------
  - name: raw_shopify
    description: "Per-client Shopify data"
    schema: raw
    tables:
      - name: orders
        identifier: "{{ var('client_slug') }}_orders"
        description: Shopify orders
      - name: order_refunds
        identifier: "{{ var('client_slug') }}_order_refunds"
        description: Shopify order refunds

  # ------------------------------------------------------------------
  # Per-client: Klaviyo (prefix = {client_slug}_klaviyo_)
  # Note: Current Klaviyo tables have hashed names from old setup.
  # These will be fixed when Klaviyo connections are re-created with
  # correct prefix pattern ({client_slug}_klaviyo_).
  # ------------------------------------------------------------------
  - name: raw_klaviyo
    description: "Per-client Klaviyo data"
    schema: raw
    tables:
      - name: campaigns
        identifier: "{{ var('client_slug') }}_klaviyo_campaigns"
        description: Klaviyo campaigns
      - name: events
        identifier: "{{ var('client_slug') }}_klaviyo_events"
        description: Klaviyo events (sends, opens, clicks)
      - name: campaign_values_reports
        identifier: "{{ var('client_slug') }}_klaviyo_campaign_values_reports"
        description: Klaviyo aggregated campaign metrics

  # ------------------------------------------------------------------
  # Optional: Metricool (TikTok organic — disabled by default)
  # ------------------------------------------------------------------
  - name: raw_metricool
    description: Raw TikTok organic metrics from Metricool
    schema: raw
    tables:
      - name: metricool_tiktok_daily
        description: Metricool TikTok account daily metrics
